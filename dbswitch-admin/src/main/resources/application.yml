spring:
  profiles:
    include: h2
    #include: mysql
    #include: postgres
  application:
    name: dbswitch-admin
  tomcat:
    uri-encoding: UTF-8
    max-http-header-size: 8096
  mvc:
    throw-exception-if-no-handler-found: false
    static-path-pattern: /statics/**

server:
  port: 9088

mybatis:
  configuration:
    lazy-loading-enabled: true
    aggressive-lazy-loading: false
    map-underscore-to-camel-case: true
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

dbswitch:
  configuration:
    drivers-base-path: ${APP_DRIVERS_PATH}

# Swagger 两种方式都可以关闭
swagger:
  enable: false

springfox:
  documentation:
    # 关键：全局禁用开关
    enabled: false
    swagger-ui:
      enabled: false
    swagger:
      enabled: false
      v2:
        enabled: false
    auto-startup: false