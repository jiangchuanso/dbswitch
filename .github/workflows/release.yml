name: Build, Release and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.0.2)'
        required: true
        default: '2.0.2'

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${{ github.ref_name }}"
            VERSION=${TAG_NAME#v}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      # 直接使用 Maven 构建，不依赖 docker-maven-build.sh
      - name: Build dbswitch package with Maven
        run: |
          # 设置版本号（如果需要）
          if [ -n "${{ steps.get_version.outputs.version }}" ]; then
            mvn versions:set -DnewVersion=${{ steps.get_version.outputs.version }}
          fi
          # 执行打包命令（参考原始的 docker-maven-build.sh）
          mvn clean package -DskipTests
          # 或者使用 profile
          # mvn clean package -Prelease -DskipTests

      - name: Find generated tar.gz file
        id: find_tar
        run: |
          # 查找打包生成的文件
          TAR_FILE=$(find target -name "dbswitch-release-*.tar.gz" -type f | head -n 1)
          if [ -z "$TAR_FILE" ]; then
            echo "Error: No tar.gz file found in target/"
            echo "Available files:"
            ls -la target/ || true
            exit 1
          fi
          echo "tar_file=${TAR_FILE}" >> $GITHUB_OUTPUT
          echo "tar_name=$(basename ${TAR_FILE})" >> $GITHUB_OUTPUT
          echo "Found: ${TAR_FILE}"

      # 后续步骤保持不变...
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          body: |
            ## dbswitch ${{ steps.get_version.outputs.version }}
            
            This release is automatically built by GitHub Actions.
          files: ${{ steps.find_tar.outputs.tar_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker build files
        run: |
          mkdir -p /tmp/dbswitch-extract
          tar -xzf ${{ steps.find_tar.outputs.tar_file }} -C /tmp/dbswitch-extract
          EXTRACT_DIR=$(ls -d /tmp/dbswitch-extract/dbswitch-release-* | head -n 1)
          
          DOCKER_BUILD_DIR=./build-docker/dbswitch/dbswitch-release
          mkdir -p $DOCKER_BUILD_DIR/{lib,ext,drivers,bin,config}
          
          cp -r $EXTRACT_DIR/* $DOCKER_BUILD_DIR/ 2>/dev/null || true
          rm -rf /tmp/dbswitch-extract
          
          echo "Docker build files prepared"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./build-docker/dbswitch
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dbswitch:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/dbswitch:latest
          build-args: |
            DBSWITCH_VERSION=${{ steps.get_version.outputs.version }}
