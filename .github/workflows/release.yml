name: Build, Release and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.0.2)'
        required: true
        default: '2.0.2'

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${{ github.ref_name }}"
            VERSION=${TAG_NAME#v}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      # 使用 Maven 构建
      - name: Build dbswitch package with Maven
        run: |
          mvn clean package -DskipTests

      - name: Find generated tar.gz file
        id: find_tar
        run: |
          TAR_FILE=$(find target -name "dbswitch-release-*.tar.gz" -type f | head -n 1)
          if [ -z "$TAR_FILE" ]; then
            echo "Error: No tar.gz file found"
            find target/ -name "*.tar.gz" || true
            exit 1
          fi
          echo "tar_file=${TAR_FILE}" >> $GITHUB_OUTPUT
          echo "tar_name=$(basename ${TAR_FILE})" >> $GITHUB_OUTPUT
          echo "Found: ${TAR_FILE}"

      # 创建 Release
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          body: |
            ## dbswitch ${{ steps.get_version.outputs.version }}
            
            This release is automatically built by GitHub Actions.
          files: ${{ steps.find_tar.outputs.tar_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 关键修复：复制 tar.gz 到 Docker 构建目录
      - name: Prepare Docker build files
        run: |
          # 创建 Docker 构建目录（如果不存在）
          mkdir -p ./build-docker/dbswitch
          
          # 直接复制 tar.gz 文件到 Docker 构建目录
          cp ${{ steps.find_tar.outputs.tar_file }} ./build-docker/dbswitch/dbswitch-release.tar.gz
          
          # 验证文件已复制
          ls -lh ./build-docker/dbswitch/dbswitch-release.tar.gz
          
          echo "Docker build files prepared"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./build-docker/dbswitch
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dbswitch:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/dbswitch:latest
          build-args: |
            DBSWITCH_VERSION=${{ steps.get_version.outputs.version }}
