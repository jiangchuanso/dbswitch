name: Build and Publish Multi-Arch Docker Image

on:
  push:
    # 当推送以 'v' 开头的标签时触发，例如 v2.0.2, v2.1.0
    tags:
      - 'v*'
  # 支持手动触发，方便测试
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (tag)'
        required: true
        default: 'v2.0.2-test'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 为构建x86和arm64架构镜像，需要使用QEMU进行跨平台模拟
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 重要：设置QEMU以支持构建arm64镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 重要：设置Docker Buildx，这是构建多平台镜像的关键工具
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到GitHub Container Registry (ghcr.io)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取版本标签，例如从 'v2.0.2' 提取出 '2.0.2'
      - name: Extract version
        id: get_version
        run: |
          # 获取触发事件的标签名，例如 'v2.0.2' 或手动输入的版本
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ github.event.inputs.version }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          # 去除标签名开头的 'v'
          VERSION=${TAG_NAME#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      # 构建并推送多平台镜像到 ghcr.io
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 指定构建上下文为包含 Dockerfile 的 build-docker/dbswitch 目录
          context: ./build-docker/dbswitch
          # 重要：指定要构建的平台列表 (linux/amd64, linux/arm64)
          platforms: linux/amd64, linux/arm64
          # 启用推送
          push: true
          # 设置镜像标签
          tags: |
            ghcr.io/${{ github.repository_owner }}/dbswitch:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/dbswitch:latest
          # 设置构建参数（可选），例如可以传递版本号作为构建参数供Dockerfile使用
          build-args: |
            DBSWITCH_VERSION=${{ steps.get_version.outputs.version }}
