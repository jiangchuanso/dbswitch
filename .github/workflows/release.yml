name: Build, Release and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.0.2)'
        required: true
        default: '2.0.2'

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${{ github.ref_name }}"
            VERSION=${TAG_NAME#v}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Build dbswitch package with Maven
        run: |
          mvn clean package -DskipTests

      - name: Find generated tar.gz file
        id: find_tar
        run: |
          TAR_FILE=$(find target -name "dbswitch-release-*.tar.gz" -type f | head -n 1)
          if [ -z "$TAR_FILE" ]; then
            echo "Error: No tar.gz file found"
            find target/ -name "*.tar.gz" || true
            exit 1
          fi
          echo "tar_file=${TAR_FILE}" >> $GITHUB_OUTPUT
          echo "tar_name=$(basename ${TAR_FILE})" >> $GITHUB_OUTPUT
          echo "Found: ${TAR_FILE}"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          body: |
            ## dbswitch ${{ steps.get_version.outputs.version }}
            
            This release is automatically built by GitHub Actions.
          files: ${{ steps.find_tar.outputs.tar_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 关键：将原始 tar.gz 解压并重组为 docker 需要的目录结构
      - name: Prepare Docker build context
        run: |
          # 创建临时目录
          mkdir -p ./docker-context/dbswitch
          cd ./docker-context
          
          # 复制原始 tar.gz
          cp ${{ steps.find_tar.outputs.tar_file }} ./original.tar.gz
          
          # 解压到临时目录
          mkdir tmp_extract
          tar -xzf original.tar.gz -C tmp_extract
          
          # 查找解压后的唯一顶层目录（例如 dbswitch-release-2.0.2）
          EXTRACTED_DIR=$(find tmp_extract -maxdepth 1 -type d ! -path tmp_extract | head -1)
          if [ -z "$EXTRACTED_DIR" ]; then
            echo "Error: No directory found after extraction"
            exit 1
          fi
          
          echo "Extracted directory: $EXTRACTED_DIR"
          
          # 将顶层目录下的所有内容移动到 dbswitch-release 目录
          mv "$EXTRACTED_DIR" ./dbswitch-release
          
          # 重新打包，使其解压后直接得到 dbswitch-release 目录
          tar -czf dbswitch/dbswitch-release.tar.gz ./dbswitch-release
          
          # 清理临时文件
          rm -rf tmp_extract original.tar.gz
          
          # 验证最终 tar.gz 的目录结构（调试用）
          echo "Contents of final tar.gz:"
          tar -tzf dbswitch/dbswitch-release.tar.gz | head -10
          
          # 同时准备 Dockerfile（如果项目中没有，需要在这里创建）
          # 假设 Dockerfile 存在于仓库根目录的 docker/Dockerfile，复制过来
          # 如果没有，可以在此处生成一个标准 Dockerfile
          if [ -f ../Dockerfile ]; then
            cp ../Dockerfile dbswitch/
          else
            cat > dbswitch/Dockerfile << 'EOF'
FROM eclipse-temurin:8-jre

COPY dbswitch-release.tar.gz /tmp/

RUN mkdir -p /dbswitch-release \
    && tar -xzf /tmp/dbswitch-release.tar.gz -C /dbswitch-release \
    && rm /tmp/dbswitch-release.tar.gz

WORKDIR /dbswitch-release

# 确保启动脚本可执行（目录结构现在是 /dbswitch-release/bin/startup.sh）
RUN chmod u+x bin/startup.sh

CMD ["/dbswitch-release/bin/startup.sh"]
EOF
          fi
          
          echo "Docker context prepared at ./docker-context/dbswitch"
          ls -lh dbswitch/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context/dbswitch
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dbswitch:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/dbswitch:latest
          # 不再需要 build-args，因为我们已经预处理了目录结构