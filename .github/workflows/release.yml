name: Package and Release dbswitch

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码（当前仓库）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 1.8
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # 3. 缓存 Maven 依赖
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. 编译打包
      - name: Build with Maven
        run: |
          chmod +x build.sh
          sh ./build.sh

      # 5. 查找 tar.gz 文件
      - name: Find tar.gz file
        id: find_tar
        run: |
          TAR_FILE=$(ls target/dbswitch-release-*.tar.gz | head -n 1)
          echo "tar_file=$TAR_FILE" >> $GITHUB_OUTPUT
          echo "tar_name=$(basename $TAR_FILE)" >> $GITHUB_OUTPUT

      # 6. 发布到 Releases
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_tar.outputs.tar_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
