name: Build, Release and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.0.2)'
        required: true
        default: '2.0.2'

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${{ github.ref_name }}"
            VERSION=${TAG_NAME#v}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Build dbswitch package with Maven
        run: |
          mvn clean package -DskipTests

      - name: Find generated tar.gz file
        id: find_tar
        run: |
          TAR_FILE=$(find target -name "dbswitch-release-*.tar.gz" -type f | head -n 1)
          if [ -z "$TAR_FILE" ]; then
            echo "Error: No tar.gz file found"
            find target/ -name "*.tar.gz" || true
            exit 1
          fi
          ABSOLUTE_PATH="${PWD}/${TAR_FILE}"
          echo "tar_file=${ABSOLUTE_PATH}" >> $GITHUB_OUTPUT
          echo "tar_name=$(basename ${TAR_FILE})" >> $GITHUB_OUTPUT
          echo "Found: ${ABSOLUTE_PATH}"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: Release ${{ steps.get_version.outputs.tag_name }}
          body: |
            ## dbswitch ${{ steps.get_version.outputs.version }}
            
            This release is automatically built by GitHub Actions.
          files: ${{ steps.find_tar.outputs.tar_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker build context
        run: |
          set -e
          mkdir -p ./docker-context/dbswitch/contents
          cd ./docker-context
          
          # 复制原始 tarball 并解压
          cp "${{ steps.find_tar.outputs.tar_file }}" ./original.tar.gz
          mkdir tmp_extract
          tar -xzf original.tar.gz -C tmp_extract
          
          # 找到解压出的唯一顶层目录（如 dbswitch-release-2.0.2）
          EXTRACTED_DIR=$(find tmp_extract -maxdepth 1 -type d ! -path tmp_extract | head -1)
          if [ -z "$EXTRACTED_DIR" ]; then
            echo "Error: No directory found after extraction"
            exit 1
          fi
          
          echo "Extracted directory: $EXTRACTED_DIR"
          # 将其内部所有内容移动到 contents/ 目录下
          mv "$EXTRACTED_DIR"/* ./dbswitch/contents/
          
          # 清理临时文件
          rm -rf tmp_extract original.tar.gz
          
          # 生成 Dockerfile（直接复制目录，不涉及 tar）
          cat > dbswitch/Dockerfile << 'EOF'
FROM eclipse-temurin:8-jre

COPY contents /dbswitch-release
WORKDIR /dbswitch-release
RUN chmod u+x bin/startup.sh

CMD ["/dbswitch-release/bin/startup.sh"]
EOF
          
          echo "Docker context prepared at ./docker-context/dbswitch"
          ls -lh dbswitch/contents/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker-context/dbswitch
          platforms: linux/amd64, linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dbswitch:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/dbswitch:latest
